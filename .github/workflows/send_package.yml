
name: Send Custom Package

on:
  workflow_dispatch:
    inputs:
      recipient_email:
        description: 'Recipient email address'
        required: true
        type: string
      api_key:
        description: 'API key for injection'
        required: false
        type: string
      #environment:
      #  description: 'Environment (dev/prod)'
      #  required: false
      #  type: choice
      #  options:
      #    - dev
      #    - prod
      #  default: 'dev'
      custom_message:
        description: 'Message to recipient'
        required: false
        type: string
        default: 'Your personalized package with code'

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-dotenv
          
      - name: Create package
        run: |
          # Create temporary directory
          mkdir -p /tmp/package
          
          # Copy files (excluding .git and other unnecessary files)
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='.github' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.env' \
            ./ /tmp/package/
          
          # Create README for recipient
          cat > /tmp/package/RECIPIENT_README.txt << EOF
          Hello!
          
          ${{ github.event.inputs.custom_message }}
          
          Configuration parameters:
          - Creation date: $(date)
          
          Launch instructions can be found in README.md
          EOF
          
          # Spakuj do archiwum
          cd /tmp
          zip -r package.zip package/
          
          # Show size
          ls -lh package.zip
          
      - name: Generate unique release tag
        id: release_tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          RANDOM_ID=$(openssl rand -hex 4)
          TAG="package-${TIMESTAMP}-${RANDOM_ID}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"
          
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          release_name: Package for ${{ github.event.inputs.recipient_email }}
          body: |
            Automated package delivery
            Created: ${{ steps.release_tag.outputs.tag }}
            Recipient: ${{ github.event.inputs.recipient_email }}
          draft: true
          prerelease: false
          
      - name: Upload package to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/package.zip
          asset_name: package.zip
          asset_content_type: application/zip
          
      - name: Get download URL
        id: download_url
        run: |
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release_tag.outputs.tag }}/package.zip"
          echo "url=${ASSET_URL}" >> $GITHUB_OUTPUT
          echo "Download URL: ${ASSET_URL}"
          
      - name: Send email with download link
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DOWNLOAD_URL: ${{ steps.download_url.outputs.url }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          python .github/scripts/send_email.py "${{ github.event.inputs.recipient_email }}" --link "${DOWNLOAD_URL}" --tag "${RELEASE_TAG}"
          
      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/package /tmp/package.zip
